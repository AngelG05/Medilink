<!DOCTYPE html>
<html lang="en">
<head>

<body>
    <div class="signup">
        <div class="medilink">
            <img src="remove2.png" alt="this is an image" height="70px" class="img_medilink">

       <div class="signup2">
        
         <div class="usr">
                <label for="username"></label>

         </div><br>
         <!-- email -->
         <div class="email">
                <label for="email"></label>
                <input class="username_class" type="text" name="email" id="email" placeholder="Enter the correct email">
         </div><br>
         <div class="phno.">
                <label for="phno."></label>
                <input class="username_class" type="text" name="phno." id="phone" placeholder="Enter your phone number.">
         </div><br>
         <!-- STATE SELECTION -->

         <div class="pass">
                <label for="pass"></label>
                <input class="username_class" type="password" name="pass" id="pass" placeholder="Enter the correct password">
         </div><br>
         <div class="states">
            <label for="state"></label>
                <select class="username_class" name="state" id="state">
                    <option class="username_class" value=" ">Select your state</option>
                    <option value="Delhi">Delhi</option>
                    <option value="Punjab">Punjab</option>

                    <option value="Uttar Pradesh">Uttar Pradesh</option>

                    <option value="Mumbai">Mumbai</option>
                </select>
         </div><br>

         </div>
               
           
           
            <!-- <p class="agreement">I agree to all Terms & Conditions</p><br> -->
